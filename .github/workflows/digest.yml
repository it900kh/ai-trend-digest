name: AIトレンド収集

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 依存関係をインストール
        run: npm install

      - name: 収集→要約→書き出し
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run run

      - name: 更新をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/digest.json data/digest.db
          git diff --staged --quiet || git commit -m "chore: AIトレンド更新 $(date +%F)"
          git push
