name: AIトレンド収集

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 依存関係をインストール
        run: npm install

      - name: 収集→要約→書き出し
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run run

      - name: 更新をコミット
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: AIトレンド更新"
          file_pattern: "data/digest.json data/digest.db"
